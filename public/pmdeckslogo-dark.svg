<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" fill="none">
  <defs>
    <linearGradient id="cardDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Fanned side cards -->
  <rect x="180" y="80" width="230" height="320" rx="22" transform="rotate(-14 295 240)" fill="url(#cardDark)" opacity="0.95"/>
  <rect x="490" y="80" width="230" height="320" rx="22" transform="rotate(14 605 240)" fill="url(#cardDark)" opacity="0.95"/>

  <!-- Back stack cards -->
  <rect x="320" y="350" width="260" height="90" rx="18" transform="rotate(-10 450 395)" fill="#0f172a" opacity="0.75"/>
  <rect x="320" y="350" width="260" height="90" rx="18" transform="rotate(10 450 395)" fill="#0f172a" opacity="0.75"/>

  <!-- Front card -->
  <rect x="285" y="55" width="330" height="430" rx="28" fill="url(#cardDark)" stroke="#1f2937" stroke-width="4" filter="url(#soft)"/>

  <!-- Spade mark -->
  <path d="M450 128c-21 29-84 78-84 125 0 27 22 49 49 49 14 0 26-6 35-16 9 10 21 16 35 16 27 0 49-22 49-49 0-47-63-96-84-125z" fill="#e5e7eb"/>
  <path d="M450 248v42" stroke="#e5e7eb" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="433" cy="292" rx="13" ry="9" fill="#e5e7eb"/>
  <ellipse cx="467" cy="292" rx="13" ry="9" fill="#e5e7eb"/>

  <!-- PM monogram -->
  <text x="450" y="390" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="140" font-weight="700" fill="#d1d5db" letter-spacing="-4">PM</text>

  <!-- Brand text -->
  <text x="450" y="605" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="122" font-weight="800" fill="#111827" letter-spacing="-2">PMDecks</text>
</svg>
