<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMDek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>

<body class="h-full flex flex-col">

  <!-- ── 1. Landing / Sign-in view ───────────────────────────────────────── -->
  <div id="landing-view" class="flex-1 items-center justify-center p-6">
    <div class="w-full max-w-sm text-center">

      <div class="mb-8">
        <span class="text-4xl font-bold text-brand-500 tracking-tight">PM</span><span class="text-4xl font-bold text-gray-800 tracking-tight">Dek</span>
        <p class="mt-2 text-sm text-gray-500">Your lightweight Kanban board</p>
      </div>

      <p id="auth-error" class="hidden mb-4 text-sm rounded-lg px-4 py-2"></p>

      <div class="flex flex-col gap-3">

        <button id="google-sign-in" class="btn-signin">
          <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>

        <button id="github-sign-in" class="btn-signin">
          <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482
                 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462
                 -1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529
                 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943
                 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75
                 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025
                 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842
                 -2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743
                 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          Sign in with GitHub
        </button>

        <div class="flex items-center gap-3 my-1">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400">or</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <form id="email-auth-form" class="flex flex-col gap-2 text-left">
          <input id="email-input" type="email" autocomplete="email" placeholder="Email"
            required class="w-full rounded-lg border-gray-300 text-sm focus:ring-brand-500 focus:border-brand-500" />
          <input id="password-input" type="password" autocomplete="current-password" placeholder="Password"
            required minlength="6" class="w-full rounded-lg border-gray-300 text-sm focus:ring-brand-500 focus:border-brand-500" />
          <button id="auth-submit-btn" type="submit"
            class="w-full py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium transition-colors">
            Sign in
          </button>
        </form>

        <div class="flex flex-col gap-1 items-center">
          <button id="forgot-password-btn" class="text-xs text-gray-400 hover:text-brand-600 transition-colors">
            Forgot password?
          </button>
          <button id="auth-toggle-btn" class="text-xs text-gray-400 hover:text-brand-600 transition-colors">
            Don't have an account? Create one
          </button>
        </div>

      </div>

      <p class="mt-8 text-xs text-gray-400">Open source · Built with Firebase + Gemini</p>
    </div>
  </div>

  <!-- ── 2. Boards home view ──────────────────────────────────────────────── -->
  <div id="boards-view" class="hidden flex-col h-full">

    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
      <span class="text-xl font-bold">
        <span class="text-brand-500">PM</span><span class="text-gray-800">Dek</span>
      </span>
      <div class="flex items-center gap-3">
        <img class="user-avatar w-7 h-7 rounded-full hidden object-cover" src="" alt="" />
        <span class="user-display-name text-sm text-gray-600 hidden sm:inline"></span>
        <button class="sign-out-btn text-sm text-gray-400 hover:text-gray-700 transition-colors">Sign out</button>
      </div>
    </header>

    <main class="flex-1 overflow-auto">
      <div class="max-w-5xl mx-auto px-6 py-10">

        <div class="flex items-center justify-between mb-8">
          <h1 class="text-2xl font-semibold text-gray-800">Boards</h1>
          <div class="flex items-center gap-2">
            <button id="ai-board-btn"
              class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-brand-600
                     bg-brand-50 hover:bg-brand-100 rounded-lg transition-colors">
              <span class="text-base leading-none">✨</span>
              Do it for me Gemini
            </button>
            <button id="create-board-btn"
              class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white
                     bg-brand-500 hover:bg-brand-600 rounded-lg transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Create board
            </button>
          </div>
        </div>

        <!-- Board tiles injected here by boards-home.js -->
        <div id="boards-root"></div>

      </div>
    </main>
  </div>

  <!-- ── 3. Board (Kanban) view ────────────────────────────────────────────── -->
  <div id="board-view" class="hidden flex-col h-full">

    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">

      <button id="back-to-boards-btn"
        class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-brand-600 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Boards
      </button>

      <span id="board-title-display" class="text-sm font-semibold text-gray-700 truncate max-w-xs"></span>

      <button id="ai-trigger-btn"
        class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-brand-600
               bg-brand-50 hover:bg-brand-100 rounded-lg transition-colors">
        <span class="text-base leading-none">✨</span>
        Do it for me Gemini
      </button>

      <div class="flex items-center gap-3">
        <img class="user-avatar w-7 h-7 rounded-full hidden object-cover" src="" alt="" />
        <span class="user-display-name text-sm text-gray-600 hidden sm:inline"></span>
        <button class="sign-out-btn text-sm text-gray-400 hover:text-gray-700 transition-colors">Sign out</button>
      </div>

    </header>

    <main class="flex-1 overflow-auto p-6">
      <div id="board-root"></div>
    </main>

  </div>

  <!-- Modal portal -->
  <div id="modal-root"></div>

  <script type="module" src="/src/main.js"></script>

</body>
</html>
